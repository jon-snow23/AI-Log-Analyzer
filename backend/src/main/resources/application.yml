spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/loganalyzer}
    username: ${SPRING_DATASOURCE_USERNAME:loganalyzer}
    password: ${SPRING_DATASOURCE_PASSWORD:loganalyzer}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.loganalyzer: INFO

ai:
  enabled: ${AI_ENABLED:false}
  provider: ${AI_PROVIDER:openrouter}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
    endpoint: ${GEMINI_API_ENDPOINT:https://generativelanguage.googleapis.com/v1beta/models}
    timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:10}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:openrouter/free}
    endpoint: ${OPENROUTER_API_ENDPOINT:https://openrouter.ai/api/v1/chat/completions}
    timeout-seconds: ${OPENROUTER_TIMEOUT_SECONDS:15}
    app-name: ${OPENROUTER_APP_NAME:AI Log Analyzer}
